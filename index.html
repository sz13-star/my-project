<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人项目展示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background: #f5f7fa; display: flex; justify-content: center; align-items: 100vh; }
        .card { background: white; padding: 40px 60px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        .title { font-size: 24px; margin-bottom: 20px; color: #333; }
        .info { font-size: 18px; line-height: 2; color: #555; }
        .label { font-weight: bold; color: #2f6ecd; }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">课程项目展示</div>
        <div class="info">
            <p><span class="label">姓名：</span>黄胜</p>
            <p><span class="label">学号：</span> 202335020521</p>
        </div>
    </div>
</body>
</html>
